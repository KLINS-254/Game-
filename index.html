<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joy & Ticoh - Step by Step Story Sequence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030303;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        const PARTICLE_COUNT = 9000;
        const COLORS = [
            'rgba(255, 40, 100, 0.95)',   // Hot Pink
            'rgba(40, 255, 140, 0.95)',   // Neon Green
            'rgba(190, 60, 255, 0.95)',   // Purple
            'rgba(255, 210, 40, 0.95)',   // Gold Yellow
            'rgba(40, 230, 255, 0.95)'    // Electric Cyan
        ];

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        
        // Exact Step-by-Step State Controller:
        // 0 = Initial Delay (Stars Drift)
        // 1 = Show ONLY Joy (Left side)
        // 2 = Laser draws the Heart outline
        // 3 = Show Ticoh (Right side) while Heart pulses
        // 4 = Explosion across the entire screen
        let currentState = 0; 
        let stateTimer = 0;
        let particles = [];
        
        let laserProgress = 0;
        let heartScale = Math.min(width, height) / 38;

        const targets = {
            joy: [],
            ticoh: [],
            heartOutline: []
        };

        function getHeartPoint(t, scale) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            return { x: x * scale, y: -y * scale };
        }

        function generateTargets() {
            targets.joy = [];
            targets.ticoh = [];
            targets.heartOutline = [];

            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            heartScale = Math.min(width, height) / 38;

            const offCanvas = document.createElement('canvas');
            const offCtx = offCanvas.getContext('2d');
            offCanvas.width = width;
            offCanvas.height = height;

            const fontSize = Math.min(width / 12, 55);
            offCtx.font = `bold ${fontSize}px sans-serif`;
            offCtx.fillStyle = '#ffffff';
            offCtx.textBaseline = 'middle';

            // Left Side text layout
            offCtx.textAlign = 'right';
            offCtx.fillText("Joy", width / 2 - (heartScale * 4.5), height / 2);

            // Right Side text layout
            offCtx.textAlign = 'left';
            offCtx.fillText("Ticoh", width / 2 + (heartScale * 4.5), height / 2);

            try {
                const imgData = offCtx.getImageData(0, 0, width, height).data;
                const step = 2; 

                for (let y = 0; y < height; y += step) {
                    for (let x = 0; x < width; x += step) {
                        const index = (y * width + x) * 4;
                        if (imgData[index] > 200) {
                            if (x < width / 2) {
                                targets.joy.push({ x: x, y: y });
                            } else {
                                targets.ticoh.push({ x: x, y: y });
                            }
                        }
                    }
                }
            } catch (e) {
                console.error(e);
            }

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const t = Math.PI * 2 * (i / PARTICLE_COUNT);
                const pt = getHeartPoint(t, heartScale);
                targets.heartOutline.push({
                    x: width / 2 + pt.x,
                    y: height / 2 + pt.y
                });
            }

            targets.joy.sort(() => Math.random() - 0.5);
            targets.ticoh.sort(() => Math.random() - 0.5);
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.radius = Math.random() * 1.5 + 0.6;
                this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                this.ease = 0.08;
            }

            update(index) {
                if (currentState === 0) {
                    // State 0: 1.5s Initial Starfield Drift
                    this.vx *= 0.99;
                    this.vy *= 0.99;
                    if (this.x < 0 || this.x > width) this.vx *= -1;
                    if (this.y < 0 || this.y > height) this.vy *= -1;
                }
                else if (currentState === 1) {
                    // State 1: ONLY "Joy" Forms. Other particles drift loosely
                    if (index < targets.joy.length) {
                        const target = targets.joy[index];
                        this.vx += (target.x - this.x) * this.ease;
                        this.vy += (target.y - this.y) * this.ease;
                        this.vx *= 0.82; 
                        this.vy *= 0.82;
                    } else {
                        this.vx *= 0.98;
                        this.vy *= 0.98;
                        if (this.x < 0 || this.x > width) this.vx *= -1;
                        if (this.y < 0 || this.y > height) this.vy *= -1;
                    }
                }
                else if (currentState === 2) {
                    // State 2: Laser draws the Heart. "Joy" particles stay locked, rest gather to outline
                    if (index < targets.joy.length) {
                        const target = targets.joy[index];
                        this.vx += (target.x - this.x) * this.ease;
                        this.vy += (target.y - this.y) * this.ease;
                        this.vx *= 0.82; 
                        this.vy *= 0.82;
                    } else {
                        // Gather particles to the heart outline sections as the laser draws it out
                        const hIndex = index % targets.heartOutline.length;
                        const target = targets.heartOutline[hIndex];
                        this.vx += (target.x - this.x) * (this.ease * 0.6);
                        this.vy += (target.y - this.y) * (this.ease * 0.6);
                        this.vx *= 0.85;
                        this.vy *= 0.85;
                    }
                }
                else if (currentState === 3) {
                    // State 3: "Ticoh" joins. Heart is fully complete and pulsing
                    let target;
                    if (index < targets.joy.length) {
                        target = targets.joy[index];
                    } else if (index < targets.joy.length + targets.ticoh.length) {
                        target = targets.ticoh[index - targets.joy.length];
                    } else {
                        target = targets.heartOutline[index % targets.heartOutline.length];
                    }

                    if (target) {
                        const beat = 1 + Math.sin(Date.now() * 0.005) * 0.03;
                        const centerX = width / 2;
                        const centerY = height / 2;
                        
                        const dynamicX = centerX + (target.x - centerX) * beat;
                        const dynamicY = centerY + (target.y - centerY) * beat;

                        this.vx += (dynamicX - this.x) * (this.ease * 0.75);
                        this.vy += (dynamicY - this.y) * (this.ease * 0.75);
                    }
                    this.vx *= 0.85;
                    this.vy *= 0.85;
                }
                else if (currentState === 4) {
                    // State 4: Mass screen breakdown explosion loop
                    this.vx *= 0.99; 
                    this.vy *= 0.99;
                    if (this.x < 0 || this.x > width) this.vx *= -1;
                    if (this.y < 0 || this.y > height) this.vy *= -1;
                }

                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            explode() {
                const angle = Math.random() * Math.PI * 2;
                const force = Math.random() * 24 + 8; 
                this.vx = Math.cos(angle) * force;
                this.vy = Math.sin(angle) * force;
            }

            resetDrift() {
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = (Math.random() - 0.5) * 3;
            }
        }

        function init() {
            generateTargets();
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(new Particle());
            }
            animate();
        }

        window.addEventListener('load', init);
        window.addEventListener('resize', generateTargets);

        function animate() {
            ctx.fillStyle = 'rgba(3, 3, 3, 0.22)';
            ctx.fillRect(0, 0, width, height);

            stateTimer++;

            // --- Story Sequence Controller (Timed for a 15-Second Loop) ---
            if (currentState === 0 && stateTimer > 90) {
                // Step 1: 1.5 Seconds Delay Ends -> Show Joy
                currentState = 1;
                stateTimer = 0;
            } 
            else if (currentState === 1 && stateTimer > 180) {
                // Step 2: Show Joy for 3 Seconds -> Laser Starts Drawing Heart
                currentState = 2;
                stateTimer = 0;
                laserProgress = 0; 
            } 
            else if (currentState === 2 && laserProgress >= Math.PI * 2) {
                // Step 3: Once Laser completes the loop path -> Bring out Ticoh
                currentState = 3;
                stateTimer = 0;
            }
            else if (currentState === 3 && stateTimer > 300) {
                // Step 4: Keep whole sequence up for 5 Seconds -> Trigger explosion
                currentState = 4;
                stateTimer = 0;
                particles.forEach(p => p.explode());
            }
            else if (currentState === 4 && stateTimer > 120) {
                // Step 5: Explode for 2 Seconds -> Clear and loop back to start
                currentState = 0;
                stateTimer = 0;
                particles.forEach(p => p.resetDrift());
            }

            // --- Render Particles ---
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(i);
                particles[i].draw();
            }

            // --- Active Laser Pen Overlay Engine ---
            if (currentState === 2 || currentState === 3) {
                if (currentState === 2) {
                    laserProgress += 0.05; // Control drawing speed factor
                } else {
                    laserProgress = Math.PI * 2; // Fixed fully completed heart loop state
                }

                ctx.save();
                ctx.lineWidth = 4.5;
                ctx.lineCap = 'round';
                
                ctx.shadowBlur = 18;
                ctx.shadowColor = '#ff2864'; // Vivid Magenta neon aura glow

                ctx.beginPath();
                for (let t = 0; t <= laserProgress; t += 0.02) {
                    // Shift parametric index track configuration to match image start orientation
                    const pt = getHeartPoint(t - Math.PI, heartScale);
                    const lx = width / 2 + pt.x;
                    const ly = height / 2 + pt.y;
                    
                    if (t === 0) {
                        ctx.moveTo(lx, ly);
                    } else {
                        ctx.lineTo(lx, ly);
                    }
                }
                
                ctx.strokeStyle = 'rgba(255, 60, 160, 0.95)';
                ctx.stroke();
                ctx.restore();
            }

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
