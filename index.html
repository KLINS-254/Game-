<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Interactive Beverage Carousel</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; /* Prevents text highlighting while dragging */
        }

        body {
            background-color: #0b0b0b;
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 2rem;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        /* 3D Stage */
        .scene {
            width: 300px;
            height: 380px;
            perspective: 1200px; /* Depth of the 3D room */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Carousel Ring */
        .carousel {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Card Container Wrapper */
        .card-container {
            position: absolute;
            width: 260px;
            height: 360px;
            left: 20px;
            top: 10px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease, filter 0.5s ease;
            cursor: grab;
        }

        .card-container:active {
            cursor: grabbing;
        }

        /* Flip Action Modifier */
        .card-container.flipped {
            transform: rotateY(180deg) !important; 
        }

        /* Card Faces base setup */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; 
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 30px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.15);
        }

        /* Front Styling */
        .card-front {
            background: linear-gradient(135deg, #1f1f1f, #111111);
        }

        .card-front h2 {
            font-size: 2.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bottle-placeholder {
            width: 80px;
            height: 180px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed rgba(255,255,255,0.2);
            font-size: 0.8rem;
            color: #888;
        }

        /* Back Styling */
        .card-back {
            background: #151515;
            transform: rotateY(180deg);
            justify-content: center;
        }

        .card-back p {
            font-size: 1.4rem;
            line-height: 1.5;
            font-weight: 600;
            text-align: center;
            font-style: italic;
            padding: 10px;
        }

        /* Brand Colors & Glows */
        .coca-cola .card-front h2 { color: #e60000; text-shadow: 0 0 15px rgba(230,0,0,0.3); }
        .coca-cola .card-back { border-color: #e60000; background: radial-gradient(circle, #cc0000 0%, #3a0000 100%); }
        
        .sprite .card-front h2 { color: #00b359; text-shadow: 0 0 15px rgba(0,179,89,0.3); }
        .sprite .card-back { border-color: #00b359; background: radial-gradient(circle, #00994d 0%, #00331a 100%); }

        .fanta .card-front h2 { color: #ff8000; text-shadow: 0 0 15px rgba(255,128,0,0.3); }
        .fanta .card-back { border-color: #ff8000; background: radial-gradient(circle, #e67300 0%, #4d2600 100%); }

        .stoney .card-front h2 { color: #96602d; text-shadow: 0 0 15px rgba(150,96,45,0.3); }
        .stoney .card-back { border-color: #96602d; background: radial-gradient(circle, #7a4e24 0%, #2b1b0c 100%); }
